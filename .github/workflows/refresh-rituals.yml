name: Refresh ritual library

# Keeps the ritual library current as new originalbotanica.com blog posts go up.
# Incremental: ingests only new blog posts, extracts only posts without a library
# entry, and translates only rituals missing Spanish. Safe to run any time.

on:
  schedule:
    - cron: "0 12 * * 1" # Mondays at 12:00 UTC
  workflow_dispatch: {} # also runnable on demand from the Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run refresh-rituals
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
